name: clubreport-hub

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clubreport-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_PASSWORD:-ClubReportHub!2026}
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: clubreport-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: src/Services/AuthService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ClubReportHub_Auth;User Id=sa;Password=${SQL_PASSWORD:-ClubReportHub!2026};TrustServerCertificate=True
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
      SeedPasswords__Admin: ${ADMIN_SEED_PASSWORD:-Admin@2026!}
      SeedPasswords__SystemAdmin: ${SYSTEM_ADMIN_SEED_PASSWORD:-SystemAdmin@2026!}
      SeedPasswords__Manager: ${MANAGER_SEED_PASSWORD:-Manager@2026!}
      SeedPasswords__StudentAffairs: ${STUDENT_AFFAIRS_SEED_PASSWORD:-StudentAffairs@2026!}
      SeedPasswords__Treasurer: ${TREASURER_SEED_PASSWORD:-Treasurer@2026!}
      SeedPasswords__Student: ${STUDENT_SEED_PASSWORD:-Student@2026!}
      SeedPasswords__ResetExistingUsers: ${RESET_SEED_PASSWORDS:-true}
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5101:8080"

  club-service:
    build:
      context: .
      dockerfile: src/Services/ClubService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ClubReportHub_Club;User Id=sa;Password=${SQL_PASSWORD:-ClubReportHub!2026};TrustServerCertificate=True
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
      Redis__ConnectionString: redis:6379
      Redis__StreamName: clubreporthub-events
      Redis__ConsumerGroup: notification-service
      Redis__BatchSize: 5
      Redis__PollIntervalMs: 1000
      Attachments__StoragePath: /app/attachments
    volumes:
      - report-attachments:/app/attachments
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5102:8080"

  activity-service:
    build:
      context: .
      dockerfile: src/Services/ActivityService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ClubReportHub_Activity;User Id=sa;Password=${SQL_PASSWORD:-ClubReportHub!2026};TrustServerCertificate=True
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
      Redis__ConnectionString: redis:6379
      Redis__StreamName: clubreporthub-events
      Redis__ConsumerGroup: notification-service
      Redis__BatchSize: 5
      Redis__PollIntervalMs: 1000
      Services__ClubService__BaseUrl: http://club-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5106:8080"

  report-service:
    build:
      context: .
      dockerfile: src/Services/ReportService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ClubReportHub_Report;User Id=sa;Password=${SQL_PASSWORD:-ClubReportHub!2026};TrustServerCertificate=True
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
      Redis__ConnectionString: redis:6379
      Redis__StreamName: clubreporthub-events
      Redis__ConsumerGroup: notification-service
      Redis__BatchSize: 5
      Redis__PollIntervalMs: 1000
      Services__ClubService__BaseUrl: http://club-service:8080
      Services__ReportService__BaseUrl: http://report-service:8080
      Services__KpiGrpcService__BaseUrl: http://kpi-grpc-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      kpi-grpc-service:
        condition: service_healthy
    ports:
      - "5103:8080"

  finance-service:
    build:
      context: .
      dockerfile: src/Services/FinanceService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ClubReportHub_Finance;User Id=sa;Password=${SQL_PASSWORD:-ClubReportHub!2026};TrustServerCertificate=True
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
      Redis__ConnectionString: redis:6379
      Redis__StreamName: clubreporthub-events
      Redis__ConsumerGroup: notification-service
      Redis__BatchSize: 5
      Redis__PollIntervalMs: 1000
      Services__ClubService__BaseUrl: http://club-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5107:8080"

  export-service:
    build:
      context: .
      dockerfile: src/Services/ExportService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ClubReportHub_Export;User Id=sa;Password=${SQL_PASSWORD:-ClubReportHub!2026};TrustServerCertificate=True
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
      Redis__ConnectionString: redis:6379
      Redis__StreamName: clubreporthub-events
      Redis__ConsumerGroup: notification-service
      Redis__BatchSize: 5
      Redis__PollIntervalMs: 1000
      Exports__StoragePath: /app/exports
      Services__ClubService__BaseUrl: http://club-service:8080
      Services__ReportService__BaseUrl: http://report-service:8080
    volumes:
      - export-files:/app/exports
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5104:8080"

  notification-service:
    build:
      context: .
      dockerfile: src/Services/NotificationService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ClubReportHub_Notification;User Id=sa;Password=${SQL_PASSWORD:-ClubReportHub!2026};TrustServerCertificate=True
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
      Redis__ConnectionString: redis:6379
      Redis__StreamName: clubreporthub-events
      Redis__ConsumerGroup: notification-service
      Redis__ConsumerNamePrefix: notification-consumer
      Redis__BatchSize: 5
      Redis__PollIntervalMs: 1000
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5105:8080"

  kpi-grpc-service:
    build:
      context: .
      dockerfile: src/Services/KpiGrpcService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "5110:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: src/Gateway/ApiGateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-this-signing-key-with-at-least-32-characters}
    depends_on:
      - auth-service
      - club-service
      - activity-service
      - report-service
      - finance-service
      - export-service
      - notification-service
    ports:
      - "7000:8080"

volumes:
  sqlserver-data:
  redis-data:
  report-attachments:
  export-files:
