syntax = "proto3";

option csharp_namespace = "KpiGrpcService.Protos";

package kpi;

import "google/protobuf/timestamp.proto";

// Service definition for KPI calculation.
service KpiService {
  // Calculates the KPI score and rating for a specific club.
  // ReportService aggregates metrics from its DB and sends them here for calculation.
  rpc CalculateClubKpi (KpiClubRequest) returns (KpiClubResponse);
}

message KpiClubRequest {
  int32 club_id = 1;
  string club_name = 2;
  string period = 3;
  // Aggregated metrics from ReportService — gRPC service performs pure calculation.
  int32 approved_reports = 4;
  int32 activity_count = 5;
  int32 participant_count = 6;
  int32 rejected_reports = 7;
  int32 overdue_reports = 8;
  string correlation_id = 9;
}

message KpiClubResponse {
  int32 club_id = 1;
  string club_name = 2;
  double total_score = 3;
  // Rating: Excellent (>=500), Good (>=200), Average (>=50), Needs Improvement (<50)
  string rating = 4;
  int32 approved_reports = 5;
  int32 activity_count = 6;
  int32 participant_count = 7;
  google.protobuf.Timestamp calculated_at_utc = 8;
  string calculation_version = 9;
}
